{% extends 'layout.html' %}
{% block body %}
<div class="auth-shell">
  <div class="auth-card">
    <a class="brand-lockup" href="/">
      <span class="brand-mark"><img src="{{ brand.logo_png }}" alt="{{ brand.name }}" width="22"></span>
      <span class="brand-copy"><strong>{{ brand.name }}</strong><span>{{ brand.tagline }}</span></span>
    </a>
    <h1>Organisation portal</h1>
    <p>Monitor endpoints, acknowledge alerts, and manage tenant configuration from a cleaner operations view.</p>
    {% if error %}<div class="flash error">{{ error }}</div>{% endif %}
    <form method="post" action="/tenant/login" class="form-grid">
      <div class="field"><label>Email address</label><input type="email" name="email" required autofocus placeholder="admin@yourcompany.com"></div>
      <div class="field"><label>Password</label><input type="password" name="password" required placeholder="••••••••"></div>
      <button class="btn btn-primary" type="submit">Sign in to tenant dashboard</button>
    </form>
    <div class="stack-actions" style="margin-top:16px">
      <a class="btn btn-secondary" href="/tenant/forgot-password">Forgot password</a>
      <a class="btn btn-ghost" href="mailto:{{ brand.support_email or legal_contact_email }}">Need help</a>
    </div>
  </div>
</div>
{% endblock %}
