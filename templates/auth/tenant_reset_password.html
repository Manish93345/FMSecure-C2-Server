{% extends 'layout.html' %}
{% block body %}
<div class="auth-shell">
  <div class="auth-card">
    <a class="brand-lockup" href="/tenant/login">
      <span class="brand-mark"><img src="{{ brand.logo_png }}" alt="{{ brand.name }}" width="22"></span>
      <span class="brand-copy"><strong>{{ brand.name }}</strong><span>Reset tenant credentials</span></span>
    </a>
    <h1>Reset password</h1>
    <p>Use the code from the reset email and choose a new password for the tenant workspace.</p>
    {% if error %}<div class="flash error">{{ error }}</div>{% endif %}
    <form method="post" action="/tenant/reset-password" class="form-grid">
      <input type="hidden" name="email" value="{{ email }}">
      <div class="field"><label>Reset code</label><input type="text" name="otp" maxlength="6" required placeholder="123456"></div>
      <div class="field"><label>New password</label><input type="password" name="new_password" required placeholder="Minimum 8 characters"></div>
      <div class="field"><label>Confirm password</label><input type="password" name="confirm_password" required placeholder="Repeat the new password"></div>
      <button class="btn btn-primary" type="submit">Apply new password</button>
    </form>
  </div>
</div>
{% endblock %}
