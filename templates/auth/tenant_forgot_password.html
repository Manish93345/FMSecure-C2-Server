{% extends 'layout.html' %}
{% block body %}
<div class="auth-shell">
  <div class="auth-card">
    <a class="brand-lockup" href="/tenant/login">
      <span class="brand-mark"><img src="{{ brand.logo_png }}" alt="{{ brand.name }}" width="22"></span>
      <span class="brand-copy"><strong>{{ brand.name }}</strong><span>Tenant access recovery</span></span>
    </a>
    <h1>Forgot password</h1>
    <p>Enter the tenant admin email. If it exists, a reset code will be sent.</p>
    {% if error %}<div class="flash error">{{ error }}</div>{% endif %}
    {% if success %}<div class="flash success">{{ success }}</div>{% endif %}
    <form method="post" action="/tenant/forgot-password" class="form-grid">
      <div class="field"><label>Email address</label><input type="email" name="email" required placeholder="admin@company.com"></div>
      <button class="btn btn-primary" type="submit">Send reset code</button>
    </form>
    <div class="stack-actions" style="margin-top:16px">
      <a class="btn btn-secondary" href="/tenant/login">Back to sign in</a>
    </div>
  </div>
</div>
{% endblock %}
