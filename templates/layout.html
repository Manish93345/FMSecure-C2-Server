<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ meta_description or 'FMSecure endpoint detection and response platform' }}">
  <title>{% if page_title %}{{ page_title }} · {% endif %}{{ brand.name }}</title>
  <link rel="icon" href="{{ brand.logo_ico }}">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="{{ body_class or '' }}">
  {% block body %}{% endblock %}
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
